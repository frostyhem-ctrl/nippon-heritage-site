<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page introuvable | Nippon Heritage</title>
    <meta
      name="description"
      content="La page demandee est introuvable sur le site Nippon Heritage."
    />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#171314" />
    <link rel="canonical" href="https://www.nipponheritage.fr/404.html" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .error-shell {
        width: min(92vw, 760px);
        padding: 48px 32px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        background: rgba(33, 27, 29, 0.88);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
        text-align: center;
      }

      .error-shell h1 {
        margin: 0 0 18px;
      }

      .error-shell p {
        margin: 0 auto 24px;
        max-width: 48ch;
      }
    </style>
  </head>
  <body>
    <main class="error-shell">
      <p class="section-kicker">Erreur 404</p>
      <h1>Page introuvable</h1>
      <div class="accent-line" aria-hidden="true"></div>
      <p>La page demandee n'existe pas ou n'est plus disponible.</p>
      <a class="button button-primary" href="/">Revenir a l'accueil</a>
    </main>
  </body>
</html>
