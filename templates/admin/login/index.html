<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion admin | Nippon Heritage</title>
    <meta name="description" content="Connexion a l'espace admin prive Nippon Heritage." />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="theme-color" content="#171314" />
    <link rel="canonical" href="https://www.nipponheritage.fr/admin/login" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body class="admin-shell" data-state="loading">
    <main class="login-wrap">
      <section class="login-shell">
        <div class="login-card">
          <div class="login-brand">
            <img src="/assets/images/nippon-heritage-logo.png" alt="Logo Nippon Heritage" />
            <div>
              <strong>Connexion admin</strong>
              <p>Acces reserve aux administrateurs Nippon Heritage.</p>
            </div>
          </div>

          <div class="admin-message" id="login-message" aria-live="polite"></div>

          <form id="login-form" class="admin-stack">
            <label class="admin-field">
              <span>Email</span>
              <input id="login-email" type="email" required autocomplete="email" />
            </label>
            <label class="admin-field">
              <span>Mot de passe</span>
              <input id="login-password" type="password" required autocomplete="current-password" />
            </label>
            <div class="login-actions">
              <button type="submit" class="admin-button">Se connecter</button>
              <a class="admin-secondary" href="/">Retour au site</a>
            </div>
          </form>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/admin/login.js"></script>
  </body>
</html>
