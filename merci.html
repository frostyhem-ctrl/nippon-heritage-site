<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merci | Nippon Heritage</title>
    <meta
      name="description"
      content="Confirmation d'envoi du formulaire Nippon Heritage."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="thanks">
    <div class="top-strip">
      <div class="container top-strip-inner">
        <p data-i18n="top.strip">
          Import selectif depuis le Japon • 2 temps de collection • Atelier en France
        </p>
        <div class="lang-switch" aria-label="Langues disponibles" data-i18n-aria-label="aria.langSwitch">
          <button class="is-active" type="button" data-lang="fr" aria-pressed="true">FR</button>
          <button type="button" data-lang="en" aria-pressed="false">EN</button>
          <button type="button" data-lang="es" aria-pressed="false">ES</button>
          <button type="button" data-lang="it" aria-pressed="false">IT</button>
        </div>
      </div>
    </div>

    <main class="thank-you-page">
      <section class="search-section">
        <div class="container">
          <div class="section-heading centered on-dark">
            <p class="section-kicker" data-i18n="thanks.kicker">Message envoye</p>
            <h2 data-i18n="thanks.title">Merci, votre demande a bien ete transmise.</h2>
            <div class="accent-line" aria-hidden="true"></div>
            <p data-i18n="thanks.body">
              Nous revenons vers vous sur l'email indique des que possible. Vous pouvez
              maintenant retourner au site principal.
            </p>
            <a class="button button-primary" href="./" data-home-link data-i18n="thanks.cta">
              Revenir a l'accueil
            </a>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
